workflows:
  android-apk:
    name: BizHealth360 Android APK (Debug)
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug)
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - niraj417@example.com   # ← replace with your actual email
        notify:
          success: true
          failure: true
