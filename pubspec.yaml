name: bizheath360
description: BizHealth360 - AI-Powered MSME Compliance & Business Health Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.68.0

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # File handling
  file_picker: ^8.0.0+1

  # HTTP
  http: ^1.2.1

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # UI
  flutter_staggered_grid_view: ^0.7.0
  timeline_tile: ^2.0.0
  dotted_border: ^2.1.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
